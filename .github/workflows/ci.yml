name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - '!src/frontend/**'
            frontend:
              - 'src/frontend/**'
            docker:
              - 'src/Api/Dockerfile'
              - 'src/frontend/Dockerfile'
              - 'src/docker-compose.yml'
              - 'src/.dockerignore'
              - 'src/frontend/.dockerignore'
              - 'src/frontend/nginx.conf'

  backend:
    name: Backend — Build & Test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: |
          dotnet restore Api/Api.csproj
          dotnet restore ../tests/RunwayScheduling.Tests/RunwayScheduling.Tests.csproj

      - name: Build
        run: dotnet build Api/Api.csproj --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test ../tests/RunwayScheduling.Tests/RunwayScheduling.Tests.csproj
          --no-restore
          --configuration Release
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=results.trx"

      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Tests
          path: tests/RunwayScheduling.Tests/TestResults/results.trx
          reporter: dotnet-trx

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: tests/RunwayScheduling.Tests/TestResults/
          retention-days: 30

  frontend:
    name: Frontend — Lint & Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    name: Docker — Build & Scan
    needs: [changes, backend, frontend]
    if: needs.changes.outputs.docker == 'true' && !failure() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Api/Dockerfile
          push: false
          load: true
          tags: runway-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          push: false
          load: true
          tags: runway-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: runway-api:ci
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH

      - name: Upload API scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Scan Frontend image (Trivy)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: runway-frontend:ci
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH

      - name: Upload Frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
