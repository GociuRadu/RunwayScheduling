name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: |
          dotnet restore Api/Api.csproj
          dotnet restore ../tests/RunwayScheduling.Tests/RunwayScheduling.Tests.csproj

      - name: Build
        run: dotnet build Api/Api.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test ../tests/RunwayScheduling.Tests/RunwayScheduling.Tests.csproj --no-restore --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    name: Docker — Compose Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
