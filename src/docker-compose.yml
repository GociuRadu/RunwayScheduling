services:
  db:
    image: postgres:17
    container_name: runway_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: RunwayScheduling
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgre1234
    ports:
      - "5433:5432"
    volumes:
      - runway_db_data:/var/lib/postgresql/data

volumes:
  runway_db_data:
