services:
  db:
    image: postgres:17
    container_name: runway_db
    restart: unless-stopped
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - runway_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - runway_net

  api:
    build:
      context: .
      dockerfile: Api/Dockerfile
    container_name: runway_api
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5186:8080"
    networks:
      - runway_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: runway_frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - runway_net

networks:
  runway_net:
    driver: bridge

volumes:
  runway_db_data:
